name: Build SmartHome MRS

on:
  push:
    paths:
      - "smarthome.txt"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mihomo
        run: |
          wget -O mihomo.tar.gz https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64.tar.gz
          tar -xzf mihomo.tar.gz
          chmod +x mihomo
          sudo mv mihomo /usr/local/bin/

      - name: Debug input file
        run: |
          echo "=== FILE CONTENT ==="
          cat smarthome.txt

      - name: Build MRS (correct method)
        run: |
          mkdir -p output
          mihomo convert-ruleset \
            --type domain \
            --input smarthome.txt \
            --output output/smarthome.mrs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smarthome-mrs
          path: output/smarthome.mrs
