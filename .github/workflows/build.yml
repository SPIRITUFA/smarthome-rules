name: Build SmartHome MRS

on:
  push:
    paths:
      - "smarthome.txt"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rule converter
        run: |
          wget -O r2s https://github.com/2dust/ruleset-generator/releases/latest/download/ruleset-generator-linux-amd64
          chmod +x r2s

      - name: Build MRS
        run: |
          mkdir -p output

          ./r2s \
            -i smarthome.txt \
            -o output/smarthome.mrs

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: smarthome-mrs
          path: output/smarthome.mrs
