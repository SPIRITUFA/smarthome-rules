name: Build MRS

on:
  push:
    paths:
      - "smarthome.list"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install zstandard

      - name: Build MRS
        run: |
          python3 - << 'EOF'
          import zstandard as zstd

          with open("smarthome.list", "r", encoding="utf-8") as f:
              rules = [
                  line.strip()
                  for line in f
                  if line.strip() and not line.startswith("#")
              ]

          data = "\n".join(rules).encode("utf-8")

          cctx = zstd.ZstdCompressor(level=10)
          compressed = cctx.compress(data)

          with open("smarthome.mrs", "wb") as f:
              f.write(compressed)

          print(f"Rules: {len(rules)}")
          print("MRS built OK")
          EOF

      - name: Check changes
        id: changes
        run: |
          if git diff --quiet smarthome.mrs; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit & push MRS
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add smarthome.mrs
          git commit -m "update mrs"
          git push
