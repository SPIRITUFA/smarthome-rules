name: SmartHome Auto MRS Build

permissions:
  contents: write

on:
  push:
    paths:
      - "smarthome.list"
  schedule:
    - cron: "0 3 * * *"   # каждый день 03:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build MRS
        run: |
          mkdir -p build
          cp smarthome.list build/base.list

          python3 - << 'EOF'
import struct

inp = "build/base.list"
out = "smarthome.mrs"

with open(inp, "r", encoding="utf-8") as f:
    lines = []
    for l in f:
        l = l.strip()
        if not l or l.startswith("#"):
            continue
        lines.append(l)

data = "\n".join(lines).encode()

# mihomo-compatible container header
header = b"mrls" + struct.pack("<I", len(data))

with open(out, "wb") as f:
    f.write(header + data)

print("MRS BUILT OK")
EOF

      - name: Commit & Safe Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add smarthome.mrs
          git commit -m "auto update mrs" || exit 0

          # 🔥 fix for "fetch first" error
          git fetch origin main
          git reset --hard origin/main

          git add smarthome.mrs
          git commit -m "auto update mrs"
          git push
