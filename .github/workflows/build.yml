name: DEBUG LIST

on:
  push:
    paths:
      - "smarthome.list"
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: FULL DEBUG
        run: |
          echo "PWD:"
          pwd

          echo "FILES IN REPO:"
          ls -la

          echo "LOOKING FOR LIST:"
          find . -name "*.list" -type f

          echo "SHOW smarthome.list:"
          cat smarthome.list || echo "❌ FILE NOT FOUND"

          echo "FILE SIZE:"
          wc -c smarthome.list || true

          echo "LINE COUNT:"
          wc -l smarthome.list || true
