name: Build MRS

permissions:
  contents: write

on:
  push:
    paths:
      - "smarthome.list"
  schedule:
    - cron: "0 3 * * *"   # каждый день 03:00 UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ruleset
        run: |
          mkdir -p build

          # базовый файл
          cp smarthome.list build/base.list

          # можно добавить авто-источники (если хочешь расширим позже)
          # curl -s URL >> build/base.list

          # генерация MRS (простой стабильный формат)
          python3 - << 'EOF'
import struct

inp = "build/base.list"
out = "smarthome.mrs"

with open(inp, "r", encoding="utf-8") as f:
    lines = []
    for l in f:
        l = l.strip()
        if not l or l.startswith("#"):
            continue
        lines.append(l)

data = "\n".join(lines).encode()

header = b"mrls" + struct.pack("<I", len(data))

with open(out, "wb") as f:
    f.write(header + data)

print("OK BUILT")
EOF

      - name: Commit & Push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add smarthome.mrs
          git commit -m "auto update mrs" || exit 0
          git push
