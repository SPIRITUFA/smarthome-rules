name: Build MRS

on:
  push:
    paths:
      - "smarthome.list"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────
      # DEBUG INPUT
      # ─────────────────────────────
      - name: Debug input list
        run: |
          echo "===== FILE CONTENT ====="
          cat smarthome.list
          echo "========================"
          wc -l smarthome.list

      # ─────────────────────────────
      # BUILD MRS (RAW -> ZSTD)
      # ─────────────────────────────
      - name: Build MRS
        run: |
          python3 - << 'EOF'
          import zstandard as zstd

          with open("smarthome.list", "rb") as f:
              data = f.read()

          print("INPUT BYTES:", len(data))

          if len(data) == 0:
              raise Exception("smarthome.list is empty")

          cctx = zstd.ZstdCompressor(level=10)
          compressed = cctx.compress(data)

          with open("smarthome.mrs", "wb") as f:
              f.write(compressed)

          print("OUTPUT BYTES:", len(compressed))
          print("DONE")
          EOF

      # ─────────────────────────────
      # VERIFY OUTPUT
      # ─────────────────────────────
      - name: Verify MRS
        run: |
          ls -la smarthome.mrs
          wc -c smarthome.mrs

      # ─────────────────────────────
      # COMMIT IF CHANGED
      # ─────────────────────────────
      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add smarthome.mrs

          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "update mrs"
          git push
