name: Build MRS

on:
  push:
    paths:
      - "smarthome.list"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        run: sudo apt-get update && sudo apt-get install -y python3

      - name: Build MRS
        run: |
          python3 - << 'EOF'
          import struct

          inp = "smarthome.list"
          out = "smarthome.mrs"

          with open(inp, "r", encoding="utf-8") as f:
              lines = [l.strip() for l in f if l.strip() and not l.startswith("#")]

          data = "\n".join(lines).encode()

          # простой mihomo mrs контейнер
          header = b"mrls" + struct.pack("<I", len(data))

          with open(out, "wb") as f:
              f.write(header + data)

          print("OK: smarthome.mrs built")
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smarthome-mrs
          path: smarthome.mrs

      - name: Commit result
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add smarthome.mrs
          git commit -m "update mrs" || exit 0
          git push
