name: Build MRS

on:
  push:
    paths:
      - "smarthome.list"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install zstandard

      - name: Build MRS
        run: |
          python3 - << 'EOF'
          import zstandard as zstd

          with open("smarthome.list", "r", encoding="utf-8") as f:
              rules = [l.strip() for l in f if l.strip() and not l.startswith("#")]

          data = "\n".join(rules).encode()

          compressed = zstd.ZstdCompressor(level=10).compress(data)

          with open("smarthome.mrs", "wb") as f:
              f.write(compressed)

          print("OK")
          EOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: smarthome-mrs
          path: smarthome.mrs
